<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم - SLS Admin</title>
  
  <!-- منع جوجل من أرشفة الصفحة دي -->
  <meta name="robots" content="noindex, nofollow">
  
  <!-- Fonts & Tailwind -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <!-- مكتبة فيرسل السهلة (CDN) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
</head>
<body class="bg-sls-cyan-950 font-tajawal">

  <!-- 1. شاشة تسجيل الدخول -->
  <div id="login-section" class="min-h-screen flex items-center justify-center px-4">
    <div class="bg-white rounded-3xl p-8 shadow-2xl w-full max-w-md">
      <div class="text-center mb-8">
        <div class="w-20 h-20 bg-sls-cyan-100 rounded-full flex items-center justify-center mx-auto mb-4 text-4xl">🔒</div>
        <h1 class="text-2xl font-black text-sls-cyan-900">لوحة التحكم</h1>
        <p class="text-gray-500 text-sm mt-2">مخصص لإدارة جمعية الليدرز الاجتماعية</p>
      </div>

      <div id="login-error" class="hidden bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl mb-4 text-sm text-center"></div>

      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-sm font-bold text-sls-cyan-900 mb-2">البريد الإلكتروني</label>
          <input type="email" id="email" placeholder="admin@sls.com" class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-sls-cyan-500 outline-none transition" required>
        </div>
        <div>
          <label class="block text-sm font-bold text-sls-cyan-900 mb-2">كلمة المرور</label>
          <input type="password" id="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-sls-cyan-500 outline-none transition" required>
        </div>
        <button type="submit" class="w-full py-4 bg-gradient-to-r from-sls-cyan-600 to-sls-teal-600 text-white font-bold rounded-xl shadow-lg hover:shadow-xl transition-all">
          تسجيل الدخول
        </button>
      </form>
    </div>
  </div>

  <!-- 2. شاشة الداشبورد (مخفية لحد ما يدخل) -->
  <div id="dashboard-section" class="hidden min-h-screen">
    
    <!-- الهيدر -->
    <header class="bg-sls-cyan-900 border-b border-white/10 p-4 flex justify-between items-center">
      <h2 class="text-white font-bold text-lg">مرحباً بك في لوحة التحكم 👋</h2>
      <button id="logout-btn" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-bold transition">
        تسجيل خروج
      </button>
    </header>

    <!-- المحتوى الأساسي -->
    <div class="max-w-6xl mx-auto p-6">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <!-- كرت 1 -->
        <div class="bg-white rounded-2xl p-6 shadow-lg border-t-4 border-sls-cyan-500">
          <h3 class="text-gray-500 text-sm mb-2">رسائل التواصل الجديدة</h3>
          <p id="msg-count" class="text-3xl font-black text-sls-cyan-900">0</p>
        </div>
        <!-- كرت 2 -->
        <div class="bg-white rounded-2xl p-6 shadow-lg border-t-4 border-sls-gold-400">
          <h3 class="text-gray-500 text-sm mb-2">أعضاء مجلس الإدارة</h3>
          <p class="text-3xl font-black text-sls-cyan-900">7</p>
        </div>
        <!-- كرت 3 -->
        <div class="bg-white rounded-2xl p-6 shadow-lg border-t-4 border-sls-teal-500">
          <h3 class="text-gray-500 text-sm mb-2">مناطق الخدمة</h3>
          <p class="text-3xl font-black text-sls-cyan-900">16</p>
        </div>
      </div>

      <!-- قسم الرسائل -->
      <div class="bg-white rounded-2xl p-8 shadow-lg mb-8">
        <h3 class="text-xl font-bold text-sls-cyan-900 mb-6">📩 الرسائل الواردة</h3>
        <div id="messages-container" class="space-y-4">
          <p class="text-gray-400 text-center">جاري تحميل الرسائل...</p>
        </div>
      </div>

      <!-- ========================================== -->
      <!-- قسم إضافة قوافل وأنشطة جديدة -->
      <!-- ========================================== -->
      <div class="bg-white rounded-2xl p-8 shadow-lg mb-8">
        <h3 class="text-xl font-bold text-sls-cyan-900 mb-6">🚑 إضافة قافلة أو نشاط جديد</h3>
        
        <form id="convoy-form" class="space-y-5">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <!-- عنوان القافلة -->
            <div class="md:col-span-2">
              <label class="block text-sm font-bold text-sls-cyan-900 mb-2">عنوان القافلة / النشاط</label>
              <input type="text" id="convoy-title" placeholder="مثال: القافلة الطبية الكبرى بمحافظة البحيرة" class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-sls-cyan-500 outline-none transition" required>
            </div>
            
            <!-- نوع النشاط -->
            <div>
              <label class="block text-sm font-bold text-sls-cyan-900 mb-2">نوع النشاط</label>
              <select id="convoy-type" class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-sls-cyan-500 outline-none transition bg-white">
                <option value="قافلة طبية">🏥 قافلة طبية</option>
                <option value="مبادرة إنسانية">🧥 مبادرة إنسانية</option>
                <option value="تبرع بالدم">🩸 تبرع بالدم</option>
                <option value="نشاط توعوي">📢 نشاط توعوي</option>
              </select>
            </div>

            <!-- الموقع -->
            <div>
              <label class="block text-sm font-bold text-sls-cyan-900 mb-2">موقع القافلة</label>
              <input type="text" id="convoy-location" placeholder="مثال: دسوق - البحيرة" class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-sls-cyan-500 outline-none transition" required>
            </div>

            <!-- التاريخ -->
            <div>
              <label class="block text-sm font-bold text-sls-cyan-900 mb-2">التاريخ</label>
              <input type="date" id="convoy-date" class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-sls-cyan-500 outline-none transition" required>
            </div>

            <!-- إظهار كقافلة رئيسية -->
            <div class="flex items-center gap-3 pt-6">
              <input type="checkbox" id="convoy-featured" class="w-5 h-5 accent-sls-cyan-600">
              <label for="convoy-featured" class="text-sm font-bold text-sls-cyan-900">اظهار كقافلة رئيسية (في أعلى الصفحة)</label>
            </div>
          </div>

          <!-- وصف قصير (للكارت) -->
          <div>
            <label class="block text-sm font-bold text-sls-cyan-900 mb-2">وصف قصير (يظهر في الكارت)</label>
            <textarea rows="2" id="convoy-desc" placeholder="ملخص سطرين عن القافلة..." class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-sls-cyan-500 outline-none transition resize-none" required></textarea>
          </div>

          <!-- المقال كامل (لصفحة التفاصيل) -->
          <div>
            <label class="block text-sm font-bold text-sls-cyan-900 mb-2">المقال كامل / تفاصيل القافلة (يظهر لما الزائر يدوس على الكرت)</label>
            <textarea rows="8" id="convoy-article" placeholder="اكتب هنا التفاصيل الكاملة للقافلة، الأقسام الطبية، الأرقام، الشهادات... (كل سطر في الـ textarea هيتحول لفقرة في المقال)" class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-sls-cyan-500 outline-none transition" required></textarea>
          </div>

          <button type="submit" id="convoy-submit-btn" class="w-full py-4 bg-gradient-to-r from-sls-cyan-600 to-sls-teal-600 text-white font-bold rounded-xl shadow-lg hover:shadow-xl transition-all">
            حفظ القافلة وإضافتها للموقع
          </button>
        </form>
      </div>

    </div>
  </div>

  <!-- كود الفيربيس الخاص بيك -->
  <script>
    // بيانات الاتصال اللي جبتها من فيرسل
    const firebaseConfig = {
      apiKey: "AIzaSyBJ2meQFZuZYeZH7Ie8CQseBjwEV2Phg_4",
      authDomain: "sls-admin-panel.firebaseapp.com",
      databaseURL: "https://sls-admin-panel-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "sls-admin-panel",
      storageBucket: "sls-admin-panel.firebasestorage.app",
      messagingSenderId: "545641823357",
      appId: "1:545641823357:web:e0a0ee7f62205156850514",
      measurementId: "G-9YX9L874BR"
    };

    // تشغيل فيرسل
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // العناصر في الصفحة
    const loginSection = document.getElementById('login-section');
    const dashboardSection = document.getElementById('dashboard-section');
    const loginForm = document.getElementById('login-form');
    const loginError = document.getElementById('login-error');
    const logoutBtn = document.getElementById('logout-btn');
    const messagesContainer = document.getElementById('messages-container');
    const msgCountEl = document.getElementById('msg-count');

    // 1. عملية تسجيل الدخول
    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      auth.signInWithEmailAndPassword(email, password)
        .then((userCredential) => {
          // الدخول تم بنجاح
        })
        .catch((error) => {
          loginError.classList.remove('hidden');
          if(error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
            loginError.innerText = "خطأ في كلمة المرور أو الإيميل!";
          } else {
            loginError.innerText = "حدث خطأ أثناء تسجيل الدخول";
          }
        });
    });

    // 2. عملية تسجيل الخروج
    logoutBtn.addEventListener('click', () => {
      auth.signOut();
    });

    // 3. مراقبة حالة الدخول (أنت داخل ولا بره)
    auth.onAuthStateChanged((user) => {
      if (user) {
        loginSection.classList.add('hidden');
        dashboardSection.classList.remove('hidden');
        loginError.classList.add('hidden');
        loadMessages(); 
      } else {
        loginSection.classList.remove('hidden');
        dashboardSection.classList.add('hidden');
      }
    });

    // ==========================================
    // 4. دالة جلب وعرض الرسائل من فيرسل
    // ==========================================
    function loadMessages() {
      messagesContainer.innerHTML = ""; 

      db.ref('messages').on('value', (snapshot) => {
        messagesContainer.innerHTML = ""; 
        const data = snapshot.val();
        
        if (!data) {
          messagesContainer.innerHTML = '<p class="text-gray-400 text-center py-8">لا توجد رسائل جديدة حالياً.</p>';
          msgCountEl.innerText = "0";
          return;
        }

        const messagesCount = Object.values(data).length;
        msgCountEl.innerText = messagesCount;

        Object.values(data).reverse().forEach(msg => {
          const card = document.createElement('div');
          card.className = 'bg-gray-50 rounded-xl p-5 border border-gray-200 relative';
          card.innerHTML = `
            <button onclick="deleteMessage('${msg.id}')" class="absolute top-3 left-3 text-red-400 hover:text-red-600 text-sm font-bold">حذف</button>
            <div class="flex items-center gap-3 mb-3">
              <div class="w-10 h-10 bg-sls-cyan-100 rounded-full flex items-center justify-center text-sls-cyan-700 font-bold">${msg.name.charAt(0)}</div>
              <div>
                <h4 class="font-bold text-sls-cyan-900">${msg.name}</h4>
                <p class="text-xs text-gray-500">${msg.time}</p>
              </div>
            </div>
            <div class="space-y-1 text-sm text-gray-600 mb-3">
              <p><span class="font-bold">📞 الهاتف:</span> ${msg.phone || 'غير متوفر'}</p>
              <p><span class="font-bold">✉️ الإيميل:</span> ${msg.email}</p>
            </div>
            <div class="bg-white p-3 rounded-lg border">
              <p class="text-gray-700">${msg.message}</p>
            </div>
          `;
          messagesContainer.appendChild(card);
        });
      }, 
      (error) => {
        console.error("Firebase Error:", error);
        messagesContainer.innerHTML = '<p class="text-red-500 text-center py-8">حدث خطأ في تحميل الرسائل! تأكد إنك ضغطت Publish في صفحة الـ Rules.</p>';
      });
    }

    // ==========================================
    // 5. دالة حذف الرسالة
    // ==========================================
    function deleteMessage(id) {
      if(confirm("هل أنت متأكد من حذف هذه الرسالة؟")) {
        db.ref('messages/' + id).remove();
      }
    }

    // ==========================================
    // 6. كود إضافة قوافل جديدة
    // ==========================================
    const convoyForm = document.getElementById('convoy-form');
    const convoySubmitBtn = document.getElementById('convoy-submit-btn');

    if (convoyForm) {
      convoyForm.addEventListener('submit', (e) => {
        e.preventDefault();
        
        convoySubmitBtn.innerText = "جاري الحفظ...";
        convoySubmitBtn.disabled = true;

        const convoyId = db.ref('convoys').push().key;

        const convoyData = {
          id: convoyId,
          title: document.getElementById('convoy-title').value,
          type: document.getElementById('convoy-type').value,
          location: document.getElementById('convoy-location').value,
          date: document.getElementById('convoy-date').value,
          desc: document.getElementById('convoy-desc').value,
          article: document.getElementById('convoy-article').value,
          featured: document.getElementById('convoy-featured').checked
        };

        db.ref('convoys/' + convoyId).set(convoyData)
          .then(() => {
            convoySubmitBtn.innerText = "✅ تم الحفظ بنجاح!";
            convoyForm.reset();
            setTimeout(() => {
              convoySubmitBtn.innerText = "حفظ القافلة وإضافتها للموقع";
              convoySubmitBtn.disabled = false;
            }, 2000);
          })
          .catch((error) => {
            console.error("Error saving convoy:", error);
            alert("حدث خطأ أثناء الحفظ! تأكد من صلاحيات الـ Rules.");
            convoySubmitBtn.innerText = "حفظ القافلة وإضافتها للموقع";
            convoySubmitBtn.disabled = false;
          });
      });
    }
  </script>
</body>
</html>
